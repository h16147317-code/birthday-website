```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<style>
/* 🌌 BODY BACKGROUND */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;

    background: linear-gradient(135deg, #0f2027, #2d0b3a, #000000);
}

/* ✨ FADED TEXT BACKGROUND */
body::before {
    content: "You are amazing ❤️ You are special 💕 Happy Birthday 🎉 ";
    position: fixed;
    width: 200%;
    height: 200%;
    font-size: 50px;
    color: rgba(255,255,255,0.04);
    transform: rotate(-20deg);
    z-index: 0;
}

/* 💎 CENTER CONTAINER (GLASS EFFECT) */
.container {
    position: relative;
    z-index: 1;
    max-width: 400px;
    margin: 80px auto;
    padding: 30px;
    border-radius: 25px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 50px rgba(0,0,0,0.7);
    text-align: center;
}

/* 🌟 GLOW TITLE */
h1 {
    color: #aaff00;
    text-shadow: 0 0 10px #aaff00, 0 0 20px #aaff00;
}

/* 👤 IMAGE */
.profile {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    margin: 20px 0;
    border: 3px solid #aaff00;
}

/* 💬 TEXT */
p {
    font-size: 15px;
    line-height: 1.6;
}

/* 🎁 BUTTON */
button {
    background: #00ff99;
    border: none;
    padding: 12px 25px;
    border-radius: 10px;
    color: black;
    font-weight: bold;
    cursor: pointer;
    margin: 15px 0;
    transition: 0.3s;
}

button:hover {
    background: #00cc77;
    transform: scale(1.05);
}

/* 💖 FLOATING HEARTS */
.heart {
    position: absolute;
    bottom: -20px;
    font-size: 20px;
    color: pink;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-110vh); opacity: 0; }
}

/* 🎉 CONFETTI EFFECT */
.confetti {
    position: absolute;
    width: 5px;
    height: 5px;
    background: yellow;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}

</style>
</head>

<body>

<div class="container">
    <h1>🎉 Happy Birthday 🎉</h1>

    <img src="AMSHII.jpeg" class="profile">

    <p>To the most amazing person ❤️</p>

    <button onclick="showMessage()">HAMZA GIFT 🎁</button>

    <p>You are special, beautiful, and deserve all happiness 💕</p>
    <p>Thank you for being in my life 🤝</p>
    <p>Happy Birthday once again 🎂🎉</p>
</div>

<!-- 💖 HEARTS -->
<div class="heart" style="left:10%;">💖</div>
<div class="heart" style="left:30%; animation-delay:1s;">💖</div>
<div class="heart" style="left:60%; animation-delay:2s;">💖</div>
<div class="heart" style="left:80%; animation-delay:3s;">💖</div>

<script>
function showMessage() {
    alert("This is just the beginning… more surprises coming 💖✨");
}

/* 🎉 CONFETTI GENERATOR */
for (let i = 0; i < 50; i++) {
    let confetti = document.createElement("div");
    confetti.className = "confetti";
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(confetti);
}
</script>

</body>
</html>
